name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["**"]

env:
  SCHEME: "HA Volume Control"
  PROJECT: "HA Volume Control.xcodeproj"

jobs:
  build:
    name: Build & Test
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || xcodebuild build \
                -project "$PROJECT" \
                -scheme "$SCHEME" \
                -configuration Debug \
                -destination "platform=macOS" \
                CODE_SIGN_IDENTITY="" \
                CODE_SIGNING_REQUIRED=NO \
                CODE_SIGNING_ALLOWED=NO

      - name: Test (if test targets exist)
        run: |
          HAS_TESTS=$(grep -c "com.apple.product-type.bundle.unit-test" "$PROJECT/project.pbxproj" || true)
          if [ "$HAS_TESTS" -gt 0 ]; then
            xcodebuild test \
              -project "$PROJECT" \
              -scheme "$SCHEME" \
              -configuration Debug \
              -destination "platform=macOS" \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          else
            echo "No test targets found, skipping."
          fi

  package:
    name: Archive, Notarize & Export
    runs-on: macos-26
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.SIGNING_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}

      - name: Write ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>developer-id</string>
              <key>destination</key>
              <string>export</string>
          </dict>
          </plist>
          EOF

      - name: Archive
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "platform=macOS" \
            -archivePath "$RUNNER_TEMP/HA Volume Control.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/HA Volume Control.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Notarize
        env:
          NOTARIZATION_API_KEY_BASE64: ${{ secrets.NOTARIZATION_API_KEY_BASE64 }}
          NOTARIZATION_API_KEY_ID: ${{ secrets.NOTARIZATION_API_KEY_ID }}
          NOTARIZATION_API_ISSUER: ${{ secrets.NOTARIZATION_API_ISSUER }}
        run: |
          APP="$RUNNER_TEMP/export/HA Volume Control.app"
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"

          echo "$NOTARIZATION_API_KEY_BASE64" | base64 --decode -o "$KEY_PATH"

          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/app.zip"

          RESULT=$(xcrun notarytool submit "$RUNNER_TEMP/app.zip" \
            --key "$KEY_PATH" \
            --key-id "$NOTARIZATION_API_KEY_ID" \
            --issuer "$NOTARIZATION_API_ISSUER" \
            --wait \
            --output-format json)

          echo "$RESULT"

          SUBMISSION_ID=$(echo "$RESULT" | jq -r '.id')
          STATUS=$(echo "$RESULT" | jq -r '.status')

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed ($STATUS) — fetching log for submission $SUBMISSION_ID"
            xcrun notarytool log "$SUBMISSION_ID" \
              --key "$KEY_PATH" \
              --key-id "$NOTARIZATION_API_KEY_ID" \
              --issuer "$NOTARIZATION_API_ISSUER"
            exit 1
          fi

          xcrun stapler staple "$APP"

      - name: Create distributable zip
        run: |
          ditto -c -k --keepParent \
            "$RUNNER_TEMP/export/HA Volume Control.app" \
            "$RUNNER_TEMP/HA-Volume-Control.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HA-Volume-Control-${{ github.sha }}
          path: ${{ runner.temp }}/HA-Volume-Control.zip
          retention-days: 30

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version matches tag
        run: |
          MARKETING_VERSION=$(grep -m1 'MARKETING_VERSION' "HA Volume Control.xcodeproj/project.pbxproj" | sed 's/.*= //;s/;//;s/ //')
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"
          if [ "$MARKETING_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: MARKETING_VERSION=$MARKETING_VERSION does not match tag ${{ github.ref_name }}"
            exit 1
          fi
          echo "Version verified: $MARKETING_VERSION"

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: HA-Volume-Control-${{ github.sha }}
          path: dist/

      - name: Create GitHub Release
        run: |
          mv dist/HA-Volume-Control.zip "dist/HA-Volume-Control-${{ github.ref_name }}.zip"
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "dist/HA-Volume-Control-${{ github.ref_name }}.zip"
        env:
          GH_TOKEN: ${{ github.token }}

  appcast:
    name: Update Appcast
    runs-on: macos-26
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Download Sparkle tools
        run: |
          SPARKLE_VERSION=$(curl -sf \
            -H "Authorization: Bearer ${{ github.token }}" \
            "https://api.github.com/repos/sparkle-project/Sparkle/releases/latest" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")
          echo "Downloading Sparkle ${SPARKLE_VERSION}"
          curl -L -o /tmp/sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle
          echo "Sparkle tools available:"
          ls /tmp/sparkle/bin/

      - name: Sign update and update appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          ZIP_NAME="HA-Volume-Control-${TAG}.zip"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${ZIP_NAME}"

          curl -L -o "/tmp/${ZIP_NAME}" "$DOWNLOAD_URL"

          if ! SIGN_OUTPUT=$(echo "$SPARKLE_PRIVATE_KEY" | /tmp/sparkle/bin/sign_update "/tmp/${ZIP_NAME}" --ed-key-file - 2>&1); then
            echo "sign_update failed:"
            echo "$SIGN_OUTPUT"
            exit 1
          fi
          echo "sign_update output: ${SIGN_OUTPUT}"

          SIGNATURE=$(echo "$SIGN_OUTPUT" | python3 -c "import sys,re; m=re.search(r'edSignature=\"([^\"]+)\"', sys.stdin.read()); print(m.group(1))")
          FILE_SIZE=$(echo "$SIGN_OUTPUT" | python3 -c "import sys,re; m=re.search(r'length=\"([^\"]+)\"', sys.stdin.read()); print(m.group(1))")
          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")

          VERSION="$VERSION" PUB_DATE="$PUB_DATE" DOWNLOAD_URL="$DOWNLOAD_URL" \
          SIGNATURE="$SIGNATURE" FILE_SIZE="$FILE_SIZE" \
          python3 .github/scripts/update_appcast.py

      - name: Commit and push appcast
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast for ${{ github.ref_name }}"
          git push origin gh-pages
